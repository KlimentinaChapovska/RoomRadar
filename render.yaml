services:
  - type: web
    name: roomradar-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://roomradar-henna.vercel.app,https://frontend-pearl-five-stp5qeelsp.vercel.app
